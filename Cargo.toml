[package]
name = "homelab-bot"
version = "0.1.0"
edition = "2024"

[dependencies]
teloxide = "0.17"
dotenvy = "0.15"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
